<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>HidraNet Browser</title>
  <link rel="stylesheet" href="browser.css">
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-left">
      <div id="hidra-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10"/>
          <path d="M2 12h20"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/>
          <path d="M12 2a15.3 15.3 0 0 0-4 10 15.3 15.3 0 0 0 4 10"/>
        </svg>
      </div>
      <span id="titlebar-text">HidraNet</span>
    </div>
    <div id="window-controls">
      <button id="btn-minimize" title="Minimize">&#x2212;</button>
      <button id="btn-maximize" title="Maximize">&#x25A1;</button>
      <button id="btn-close" title="Close">&#x2715;</button>
    </div>
  </div>

  <div id="tab-bar">
    <div id="tabs-container"></div>
    <button id="btn-new-tab" title="New Tab">+</button>
    <div id="proxy-indicator" title="HidraNet Status">
      <span id="proxy-dot"></span>
      <span id="proxy-label">Connecting...</span>
    </div>
  </div>

  <div id="nav-bar">
    <button id="btn-back" disabled title="Back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5m0 0l7 7m-7-7l7-7"/>
      </svg>
    </button>
    <button id="btn-forward" disabled title="Forward">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14m0 0l-7 7m7-7l-7-7"/>
      </svg>
    </button>
    <button id="btn-reload" title="Reload">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 4v6h6M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
    <div id="url-container">
      <span id="url-shield" title="Anonymous connection via HidraNet">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </span>
      <input id="url-input" type="text" placeholder="Search or enter address" spellcheck="false" autocomplete="off">
    </div>
    <button id="btn-hidra-panel" title="HidraNet Panel">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/>
      </svg>
    </button>
  </div>

  <div id="hidra-panel" class="hidden">
    <h3>HidraNet Status</h3>
    <div class="panel-row">
      <span class="panel-label">Status</span>
      <span id="panel-status" class="panel-value">Disconnected</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Proxy</span>
      <span id="panel-proxy" class="panel-value">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Relays</span>
      <span id="panel-relays" class="panel-value">0</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Latency</span>
      <span id="panel-latency" class="panel-value">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Hops</span>
      <div class="panel-value">
        <select id="panel-hops">
          <option value="3" selected>3 (Standard)</option>
          <option value="5">5 (High)</option>
          <option value="7">7 (Maximum)</option>
        </select>
      </div>
    </div>
    <div class="panel-info">
      Each tab uses a unique fingerprint. No data persists between sessions.
    </div>
  </div>

  <script src="browser.js"></script>
</body>
</html>
